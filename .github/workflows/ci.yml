name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit-test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, test & coverage check
        run: |
          ./mvnw clean verify \
            -pl common,user-service,merchant-service,order-service,settlement-service \
            -am \
            --batch-mode \
            --no-transfer-progress

      - name: Print JaCoCo coverage summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          for m in common user-service merchant-service order-service settlement-service; do
            csv="$m/target/site/jacoco/jacoco.csv"
            if [ -f "$csv" ]; then
              echo "**$m**" >> $GITHUB_STEP_SUMMARY
              awk -F',' 'NR>1 {
                missed=$4+$7; covered=$5+$8;
                if (missed+covered > 0) {
                  pct=covered/(missed+covered)*100;
                  printf "  %-35s %5.1f%% (%d/%d)\n", $3, pct, covered, missed+covered
                }
              }' "$csv" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            */target/site/jacoco/
            */target/surefire-reports/*.xml
          retention-days: 7

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build common module first
        run: ./mvnw compile -pl common --batch-mode --no-transfer-progress

      - name: Run E2E tests with Testcontainers
        run: |
          ./mvnw test \
            -pl e2e-tests \
            -am \
            --batch-mode \
            --no-transfer-progress
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
          TESTCONTAINERS_REUSE_ENABLE: 'true'

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e-tests/target/surefire-reports/*.xml
          retention-days: 7
